name: Release skill zips

# On every version tag (v0.1.0, v1.2.3, ...) build one zip per skill and
# attach them to a GitHub release, so claude.ai users can download and
# upload skills without cloning the repo.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package skills
        run: bash scripts/package_skills.sh
      - name: Create release with zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/skills/*.zip --generate-notes
